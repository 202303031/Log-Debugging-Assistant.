# ============================================================
# Autonomous DevOps & Log Debugging Assistant
# Docker Compose Orchestration
# ============================================================

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: devops-postgres
    environment:
      POSTGRES_DB: devops_logs
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_logs"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devops-network

  # ── Java Victim Service ────────────────────────────────────
  victim-service:
    build:
      context: ./victim-service
      dockerfile: Dockerfile
    container_name: devops-victim
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - devops-network
    restart: unless-stopped

  # ── Python AI Engine (Gemini Agent + Streamlit) ────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: devops-ai-engine
    depends_on:
      postgres:
        condition: service_healthy
      victim-service:
        condition: service_started
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=devops_logs
      - DB_USER=devops
      - DB_PASSWORD=devops_secret
      - LOG_FILE_PATH=/app/logs/app.log
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  devops-network:
    driver: bridge
