# ============================================================
# Autonomous DevOps & Log Debugging Assistant
# Docker Compose Orchestration
# ============================================================

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: devops-postgres
    environment:
      POSTGRES_DB: devops_logs
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_logs"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devops-network

  # ── Ollama (Local LLM Server) ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: devops-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - devops-network
    restart: unless-stopped

  # ── Ollama Model Puller (one-shot init container) ──────────
  ollama-pull:
    image: curlimages/curl:latest
    container_name: devops-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "echo 'Pulling llama3.2 model...' &&
             curl -s http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}' &&
             echo 'Model pull complete!'"
    networks:
      - devops-network
    restart: "no"

  # ── Java Victim Service ────────────────────────────────────
  victim-service:
    build:
      context: ./victim-service
      dockerfile: Dockerfile
    container_name: devops-victim
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - devops-network
    restart: unless-stopped

  # ── Python AI Engine (Ollama Agent + Streamlit) ────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: devops-ai-engine
    depends_on:
      postgres:
        condition: service_healthy
      victim-service:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=devops_logs
      - DB_USER=devops
      - DB_PASSWORD=devops_secret
      - LOG_FILE_PATH=/app/logs/app.log
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    volumes:
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  devops-network:
    driver: bridge
